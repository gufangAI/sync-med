name: ocr-compare

on:
  workflow_dispatch:
    inputs:
      books:
        description: comma-separated book_ids (empty = auto pick 2)
        default: ""
      n_pages:
        description: pages per book
        default: "8"

concurrency:
  group: ocr-compare
  cancel-in-progress: false

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: git clone --depth 1 https://github.com/ndl-lab/ndlocr-lite
      - run: pip install --quiet -r ndlocr-lite/requirements.txt requests
      - run: python compare_ocr.py
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_API_TOKEN: ${{ secrets.D1_API_TOKEN }}
          PAN_CLIENT_ID: ${{ secrets.PAN_CLIENT_ID }}
          PAN_CLIENT_SECRET: ${{ secrets.PAN_CLIENT_SECRET }}
          XF_KEYS: ${{ secrets.XF_KEYS }}
          BOOKS: ${{ github.event.inputs.books }}
          N_PAGES: ${{ github.event.inputs.n_pages }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compare-report
          path: compare_report.md
          if-no-files-found: ignore

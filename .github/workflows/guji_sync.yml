name: guji-sync

on:
  workflow_dispatch:
    inputs:
      total:
        description: "shard count. 123 token limit: keep <=3 (>3 = token overflow empty-shells). default 3 = safe+fast."
        default: "3"
      bucket:
        description: "R2 source bucket"
        default: "guji-sea"
      prefix:
        description: "R2 key prefix (naj for guji-sea)"
        default: "naj"
      max_pending:
        description: "max offline tasks per shard (tune for 429 avoidance)"
        default: "20"
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: guji-sync
  cancel-in-progress: false

jobs:
  # ── PREP: scan 123 GufangP/guji/ once, write done-set snapshot to R2 ──
  prep:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3 requests
      - name: build shard list
        id: gen
        run: |
          python -c "
          import json, os
          T = int(os.environ['T'])
          print('shards=' + json.dumps(list(range(T))))
          " >> "$GITHUB_OUTPUT"
        env:
          T: ${{ github.event.inputs.total || '3' }}
      - name: prep (scan 123 done-set)
        run: python guji_sync.py prep
        env:
          S_EP:  ${{ secrets.S_EP }}
          S_AK:  ${{ secrets.S_AK }}
          S_SK:  ${{ secrets.S_SK }}
          S_BUCKET: ${{ github.event.inputs.bucket || 'guji-sea' }}
          S_PREFIX: ${{ github.event.inputs.prefix || 'naj' }}
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID:  ${{ secrets.PAN_CID }}
          PAN_SEC:  ${{ secrets.PAN_SEC }}
          PAN_GUJI_DIR: ${{ secrets.PAN_GUJI_DIR }}

  # ── SHARD MATRIX: parallel migration ──
  run:
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 256
      matrix:
        shard: ${{ fromJSON(needs.prep.outputs.shards) }}
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3 requests
      - name: migrate shard
        run: python guji_sync.py main
        env:
          S_EP:      ${{ secrets.S_EP }}
          S_AK:      ${{ secrets.S_AK }}
          S_SK:      ${{ secrets.S_SK }}
          S_BUCKET:  ${{ github.event.inputs.bucket || 'guji-sea' }}
          S_PREFIX:  ${{ github.event.inputs.prefix || 'naj' }}
          PAN_BASE:  ${{ secrets.PAN_BASE }}
          PAN_CID:   ${{ secrets.PAN_CID }}
          PAN_SEC:   ${{ secrets.PAN_SEC }}
          PAN_GUJI_DIR: ${{ secrets.PAN_GUJI_DIR }}
          SHARD:     ${{ matrix.shard }}
          TOTAL:     ${{ github.event.inputs.total || '3' }}
          MAX_PENDING: ${{ github.event.inputs.max_pending || '20' }}
          HALVES: "1"
          HALF: "0"


  # ── AUDIT: compare R2 vs 123, print K=? ──
  audit:
    needs: run
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3 requests
      - name: audit reconciliation
        run: python guji_sync.py audit
        env:
          S_EP:     ${{ secrets.S_EP }}
          S_AK:     ${{ secrets.S_AK }}
          S_SK:     ${{ secrets.S_SK }}
          S_BUCKET: ${{ github.event.inputs.bucket || 'guji-sea' }}
          S_PREFIX: ${{ github.event.inputs.prefix || 'naj' }}
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID:  ${{ secrets.PAN_CID }}
          PAN_SEC:  ${{ secrets.PAN_SEC }}
          PAN_GUJI_DIR: ${{ secrets.PAN_GUJI_DIR }}
          TOTAL:    ${{ github.event.inputs.total || '3' }}

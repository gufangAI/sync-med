name: fleet-health
on:
  schedule:
    - cron: '17 */2 * * *'
  workflow_dispatch: {}
permissions:
  issues: write
  contents: read
concurrency:
  group: fleet-health
  cancel-in-progress: false
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: probe fleet + upsert issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/intel_radar/fleet_health.py

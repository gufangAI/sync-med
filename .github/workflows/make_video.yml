name: make_video

on:
  workflow_dispatch:
    inputs:
      book:
        description: R2 book id
        default: "ylgc_2"
      pages:
        description: comma page numbers
        default: "1,2,3,4,5,6"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk
      - run: pip install --quiet boto3 edge-tts
      - run: python make_video.py
        env:
          NOVA_KEY: ${{ secrets.NOVA_KEY }}
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: ${{ secrets.S_BUCKET }}
          BOOK: ${{ github.event.inputs.book || 'ylgc_2' }}
          PAGES: ${{ github.event.inputs.pages || '1,2,3,4,5,6' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video
          path: out.mp4
          if-no-files-found: ignore

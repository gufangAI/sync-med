name: make_video

# v2 (2026-07-20): audio-first + word-level karaoke subtitles + real expert-persona grounding.
# See make_video.py header for the full pipeline description.
on:
  workflow_dispatch:
    inputs:
      book:
        description: R2 book id
        default: "ylgc_2"
      pages:
        description: comma page numbers (pages are fetched straight from 123 pan, not the public reader API)
        default: "1,2,3,4,5"
      expert_key:
        description: 'expert key from GET /api/ai/expert roster (e.g. zhongjing/yetianshi/zhudanxi/lidongyuan/lishizhen) — "auto" rotates by day-of-year'
        default: "auto"
      expert_name:
        description: display name for the expert_key above (only used when expert_key != auto)
        default: "张仲景"
      topic:
        description: 'case/symptom phrasing fed to /api/ai/expert (only used when expert_key != auto)'
        default: ""
      ratio:
        description: 'output aspect / platform: vertical = 9:16 1080x1920 (Douyin/Kuaishou/Channels), horizontal = 16:9 1920x1080 (Bilibili)'
        type: choice
        options:
          - vertical
          - horizontal
        default: vertical
      burn_sub:
        description: 'burn karaoke subtitles into the picture (true) or output a clean master with no burned subs (false)'
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
  schedule:
    # 05:17 UTC = 13:17 Beijing — offset from the top of the hour to avoid piling onto this repo's
    # many other :00/:15/:30 crons. Daily cadence keeps this experimental line producing without
    # hammering the shared free-tier gateway / the production /api/ai/expert endpoint.
    - cron: '17 5 * * *'

concurrency:
  group: make_video
  cancel-in-progress: false   # let a running render finish; queue instead of killing it mid-render

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk
      - run: pip install --quiet boto3 edge-tts
      - run: python make_video.py
        env:
          NOVA_KEY: ${{ secrets.NOVA_KEY }}
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: ${{ secrets.S_BUCKET }}
          # source page images come straight from 123 pan (2026-07-20 correction -- do not add the
          # public reader API back here, it serves real paying readers and shouldn't carry batch load)
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          D1_API_TOKEN: ${{ secrets.D1_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          PAN_CLIENT_ID: ${{ secrets.PAN_CLIENT_ID }}
          PAN_CLIENT_SECRET: ${{ secrets.PAN_CLIENT_SECRET }}
          BOOK: ${{ github.event.inputs.book || 'ylgc_2' }}
          PAGES: ${{ github.event.inputs.pages || '1,2,3,4,5' }}
          EXPERT_KEY: ${{ github.event.inputs.expert_key || 'auto' }}
          EXPERT_NAME: ${{ github.event.inputs.expert_name || '张仲景' }}
          TOPIC: ${{ github.event.inputs.topic || '' }}
          # platform adaptation (2026-07-23): schedule/cron carries no inputs, so both fall back to
          # the vertical + burn defaults -- the daily cron's output is unchanged.
          RATIO: ${{ github.event.inputs.ratio || 'vertical' }}
          BURN_SUB: ${{ github.event.inputs.burn_sub || 'true' }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-${{ github.run_id }}
          path: |
            out.mp4
            script.txt
            subs.ass
            thumb_*.jpg
          retention-days: 14
          if-no-files-found: ignore

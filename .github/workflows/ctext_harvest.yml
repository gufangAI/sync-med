name: ctext_harvest

on:
  workflow_dispatch:
    inputs:
      total:
        description: shard count
        default: "20"
      limit:
        description: books per shard per run (high = full)
        default: "400"
      workers:
        description: per-shard concurrency
        default: "8"
  schedule:
    - cron: "0 */6 * * *"   # resume gently every 6h

concurrency:
  group: ctext-harvest
  cancel-in-progress: false

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.g.outputs.shards }}
    steps:
      - id: g
        run: python -c "import json,os;print('shards='+json.dumps(list(range(int(os.environ['T'])))))" >> "$GITHUB_OUTPUT"
        env:
          T: ${{ github.event.inputs.total || '20' }}

  run:
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        shard: ${{ fromJSON(needs.prep.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet boto3
      - run: python ctext_harvest.py
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: ${{ secrets.S_BUCKET }}
          SHARD: ${{ matrix.shard }}
          TOTAL: ${{ github.event.inputs.total || '20' }}
          LIMIT: ${{ github.event.inputs.limit || '400' }}
          WORKERS: ${{ github.event.inputs.workers || '8' }}

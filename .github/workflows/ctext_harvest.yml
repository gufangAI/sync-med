name: ctext_harvest

on:
  workflow_dispatch:
    inputs:
      total:
        description: shard count
        default: "20"
      limit:
        description: books per shard per run (high = full)
        default: "400"
      workers:
        description: per-shard scrape concurrency (只管抓取,123上传永远串行)
        default: "8"
  schedule:
    - cron: "0 */6 * * *"   # resume gently every 6h

concurrency:
  group: ctext-harvest
  cancel-in-progress: false

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.g.outputs.shards }}
    steps:
      - id: g
        run: python -c "import json,os;print('shards='+json.dumps(list(range(int(os.environ['T'])))))" >> "$GITHUB_OUTPUT"
        env:
          T: ${{ github.event.inputs.total || '20' }}

  run:
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6   # 123账号总并发~15-20;上传逐shard串行,6个shard同跑=最多6路123连接,留余量给其他123任务
      matrix:
        shard: ${{ fromJSON(needs.prep.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet requests
      - name: restore ledger cache
        uses: actions/cache/restore@v4
        with:
          path: ledger.json
          key: ctext-ledger2-s${{ matrix.shard }}-${{ github.run_id }}
          restore-keys: |
            ctext-ledger2-s${{ matrix.shard }}-
      - name: restore author cache
        uses: actions/cache/restore@v4
        with:
          path: author_cache.json
          key: ctext-authors-s${{ matrix.shard }}-${{ github.run_id }}
          restore-keys: |
            ctext-authors-s${{ matrix.shard }}-
      - run: python ctext_harvest.py
        env:
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID: ${{ secrets.CTEXT_PAN_CID }}
          PAN_SEC: ${{ secrets.CTEXT_PAN_SEC }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SHARD: ${{ matrix.shard }}
          TOTAL: ${{ github.event.inputs.total || '20' }}
          LIMIT: ${{ github.event.inputs.limit || '400' }}
          WORKERS: ${{ github.event.inputs.workers || '8' }}
      - name: save ledger cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ledger.json
          key: ctext-ledger2-s${{ matrix.shard }}-${{ github.run_id }}
      - name: save author cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: author_cache.json
          key: ctext-authors-s${{ matrix.shard }}-${{ github.run_id }}

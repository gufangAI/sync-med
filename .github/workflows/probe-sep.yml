name: probe-sep
on: workflow_dispatch
jobs:
  t:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: identify bucket and list ctext
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: ${{ secrets.S_BUCKET }}
        run: |
          pip -q install boto3
          m=none
          for c in guyaofang-assets guyaofang-lib guji-lib guji-sea harvest-intake classroom fojing-lib naikaku-dl guyaofang-pdf-staging; do
            if [ "$S_BUCKET" = "$c" ]; then m=$c; fi
          done
          echo "bucket-match: $m"
          python - << 'EOF'
          import os, boto3
          s3 = boto3.client("s3", endpoint_url=os.environ["S_EP"],
                            aws_access_key_id=os.environ["S_AK"], aws_secret_access_key=os.environ["S_SK"])
          r = s3.list_objects_v2(Bucket=os.environ["S_BUCKET"], Prefix="_ctext/", MaxKeys=10)
          items = r.get("Contents") or []
          print("ctext objects:", r.get("KeyCount"))
          for it in items[:8]:
              print(" ", it["Key"], it["Size"])
          EOF

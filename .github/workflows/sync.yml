name: sync

on:
  schedule:
    - cron: "0 */3 * * *"          # 每3h自动跑·无人值守(幂等skip-done·补完后都是秒跳)
    # 2026-07-17: NAME_KEY自愈已验证真实生效(D1现场重建39488个书名成功),恢复cron。
  workflow_dispatch:
    inputs:
      total:
        description: shard count (concurrency)
        default: "3"
concurrency:
  group: sync-med
  cancel-in-progress: false

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.g.outputs.shards }}
    steps:
      - id: g
        run: python -c "import json,os;print('shards='+json.dumps(list(range(int(os.environ['T'])))))" >> "$GITHUB_OUTPUT"
        env:
          T: ${{ github.event.inputs.total || '256' }}
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3 requests pillow
      - name: build already-done list (skip backed-up books, no dup errors)
        run: python sync.py prep
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: ${{ secrets.S_BUCKET }}
          S_PREFIX: ${{ secrets.S_PREFIX }}
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID: ${{ secrets.PAN_CID }}
          PAN_SEC: ${{ secrets.PAN_SEC }}
          PAN_DIR_A: ${{ secrets.PAN_DIR_A }}
          PAN_DIR_B: ${{ secrets.PAN_DIR_B }}

  run:
    needs: prep
    runs-on: ubuntu-latest
    timeout-minutes: 120         # 硬闸:超 2 小时 GitHub 杀(防卡死·06-20 慢上传留足时间·幂等 skip-done 下次续)
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        shard: ${{ fromJSON(needs.prep.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3 requests pillow
      - run: python sync.py
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: ${{ secrets.S_BUCKET }}
          S_PREFIX: ${{ secrets.S_PREFIX }}
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID: ${{ secrets.PAN_CID }}
          PAN_SEC: ${{ secrets.PAN_SEC }}
          PAN_DIR_A: ${{ secrets.PAN_DIR_A }}
          PAN_DIR_B: ${{ secrets.PAN_DIR_B }}
          NAME_KEY: ${{ secrets.NAME_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_API_TOKEN: ${{ secrets.D1_API_TOKEN }}
          # 2026-07-22: 取图从123需要的open_platform凭据(与推zip/pdf的PAN_CID/PSEC不同对,secret仓库已有)
          PAN_CLIENT_ID: ${{ secrets.PAN_CLIENT_ID }}
          PAN_CLIENT_SECRET: ${{ secrets.PAN_CLIENT_SECRET }}
          SHARD: ${{ matrix.shard }}
          TOTAL: ${{ github.event.inputs.total || '256' }}

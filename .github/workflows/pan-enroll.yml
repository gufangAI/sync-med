name: pan-enroll
on:
  workflow_dispatch:
    inputs:
      roster_file:
        description: 'roster json path in repo (ascii-escaped)'
        default: 'scripts/fuji_roster.json'
      source_root:
        description: 'source_root for new records'
        default: 'fujikawa'
      prefix:
        description: 'only consider 123 folders with this name prefix'
        default: 'fuji-'
      limit:
        description: 'max books to enroll, 0 = all'
        default: '0'
concurrency:
  group: pan-enroll
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip -q install requests
      - name: enroll
        env:
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID: ${{ secrets.PAN_CID }}
          PAN_SEC: ${{ secrets.PAN_SEC }}
          ASSET_SYNC_TOKEN: ${{ secrets.ASSET_SYNC_TOKEN }}
          ROSTER_FILE: ${{ inputs.roster_file }}
          SOURCE_ROOT: ${{ inputs.source_root }}
          FOLDER_PREFIX: ${{ inputs.prefix }}
          LIMIT: ${{ inputs.limit }}
        run: python scripts/pan_enroll.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pan-enroll-out
          path: out/
          if-no-files-found: warn

name: vectorize-ingest


on:
  workflow_dispatch:
    inputs:
      total:
        description: "shard count (matrix parallelism)"
        default: "20"
  schedule:
    - cron: "20 */6 * * *"

concurrency:
  group: vectorize-ingest
  cancel-in-progress: false

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - id: gen
        run: |
          python -c "
          import json, os
          T = int(os.environ['T'])
          print('shards=' + json.dumps(list(range(T))))
          " >> "$GITHUB_OUTPUT"
        env:
          T: ${{ github.event.inputs.total || '20' }}

  run:
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        shard: ${{ fromJSON(needs.prep.outputs.shards) }}
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet boto3 requests
      - name: restore ledger cache
        uses: actions/cache/restore@v4
        with:
          path: ledger.json
          key: vectorize-ledger-s${{ matrix.shard }}-${{ github.run_id }}
          restore-keys: |
            vectorize-ledger-s${{ matrix.shard }}-
      - name: ingest shard
        run: python vectorize_ingest.py
        env:
          CF_ACCOUNT_ID:       ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN_SCOPED: ${{ secrets.CF_API_TOKEN_SCOPED }}
          CF_GLOBAL_EMAIL:   ${{ secrets.CF_GLOBAL_EMAIL }}
          CF_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
          R2_ENDPOINT:       ${{ secrets.VEC_R2_ENDPOINT }}
          R2_ACCESS_KEY:     ${{ secrets.VEC_R2_ACCESS_KEY }}
          R2_SECRET_KEY:     ${{ secrets.VEC_R2_SECRET_KEY }}
          VEC_INDEX: "tcm-rag-768"
          SHARD: ${{ matrix.shard }}
          TOTAL: ${{ github.event.inputs.total || '20' }}
      - name: save ledger cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ledger.json
          key: vectorize-ledger-s${{ matrix.shard }}-${{ github.run_id }}

  # ── AUDIT: query Vectorize REST info endpoint, print vector count before/after ──
  audit:
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: query index vector count
        run: |
          if [ -n "${CF_API_TOKEN_SCOPED:-}" ]; then
            AUTH_ARGS=(-H "Authorization: Bearer ${CF_API_TOKEN_SCOPED}")
          else
            AUTH_ARGS=(-H "X-Auth-Email: ${CF_GLOBAL_EMAIL}" -H "X-Auth-Key: ${CF_GLOBAL_API_KEY}")
          fi
          curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/vectorize/v2/indexes/tcm-rag-768/info" \
            "${AUTH_ARGS[@]}" \
            -H "Content-Type: application/json" | tee "$GITHUB_STEP_SUMMARY"
        env:
          CF_ACCOUNT_ID:       ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN_SCOPED: ${{ secrets.CF_API_TOKEN_SCOPED }}
          CF_GLOBAL_EMAIL:   ${{ secrets.CF_GLOBAL_EMAIL }}
          CF_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}

name: ocr

on:
  workflow_dispatch:
    inputs:
      total:
        description: shard count (concurrency)
        default: "256"
      pilot:
        description: pilot page cap per shard (empty = full run)
        default: ""
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: ocr-run
  cancel-in-progress: false

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.g.outputs.shards }}
    steps:
      - id: g
        run: python -c "import json,os;print('shards='+json.dumps(list(range(int(os.environ['T'])))))" >> "$GITHUB_OUTPUT"
        env:
          T: ${{ github.event.inputs.total || '256' }}

  run:
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8   # was 256: org-wide Free-plan Actions concurrency ceiling is ~20 jobs shared
                        # across the whole gufangAI org; 256 let one ocr.yml tick monopolize all of it
                        # for hours, starving every other repo/workflow (2026-07-16 queue-jam root cause).
      matrix:
        shard: ${{ fromJSON(needs.prep.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install --quiet rapidocr-onnxruntime boto3 requests pillow "numpy<2"
      - run: python ocr.py
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: ${{ secrets.S_BUCKET }}
          ALLOW_KEY: ${{ secrets.ALLOW_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          D1_API_TOKEN: ${{ secrets.D1_API_TOKEN }}
          SHARD: ${{ matrix.shard }}
          TOTAL: ${{ github.event.inputs.total || '256' }}
          PILOT: ${{ github.event.inputs.pilot }}
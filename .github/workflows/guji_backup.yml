name: guji_backup

on:
  schedule:
    - cron: "30 */3 * * *"         # 每3h自动跑(错峰med 30min)·无人值守·幂等skip-done
  workflow_dispatch:
    inputs:
      total:
        description: shard count (concurrency)
        default: "150"
concurrency:
  group: guji-backup
  cancel-in-progress: false

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.g.outputs.shards }}
    steps:
      - id: g
        run: python -c "import json,os;print('shards='+json.dumps(list(range(int(os.environ['T'])))))" >> "$GITHUB_OUTPUT"
        env:
          T: ${{ github.event.inputs.total || '150' }}
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3 requests pillow
      - name: build already-done list for guji backup
        run: python sync.py prep
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: guji-sea
          S_PREFIX: naj
          PAGES_KEY: _cc/guji_pages.json
          PAN_DONE_KEY: _cc/guji_pan_done.json
          LEDGER_PREFIX: _ledger_guji/
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID: ${{ secrets.PAN_CID }}
          PAN_SEC: ${{ secrets.PAN_SEC }}
          PAN_DIR_A: "30464202"
          PAN_DIR_B: "30464203"

  run:
    needs: prep
    runs-on: ubuntu-latest
    timeout-minutes: 120         # 硬闸:超 2 小时 GitHub 杀(防卡死·06-20 慢上传留足时间·幂等 skip-done 下次续)
    strategy:
      fail-fast: false
      max-parallel: 150
      matrix:
        shard: ${{ fromJSON(needs.prep.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3 requests pillow
      - run: python sync.py
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: guji-sea
          S_PREFIX: naj
          PAGES_KEY: _cc/guji_pages.json
          PAN_DONE_KEY: _cc/guji_pan_done.json
          LEDGER_PREFIX: _ledger_guji/
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID: ${{ secrets.PAN_CID }}
          PAN_SEC: ${{ secrets.PAN_SEC }}
          PAN_DIR_A: "30464202"
          PAN_DIR_B: "30464203"
          NAME_KEY: _cc/guji_name_map.json
          SHARD: ${{ matrix.shard }}
          TOTAL: ${{ github.event.inputs.total || '150' }}

  finalize:
    needs: run
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3
      - name: aggregate shard ledgers and write summary
        run: python guji_finalize.py
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          TOTAL: ${{ github.event.inputs.total || '150' }}

name: guji_backup

on:
  workflow_dispatch:
    inputs:
      total:
        description: shard count (concurrency)
        default: "30"

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.g.outputs.shards }}
    steps:
      - id: g
        run: python -c "import json,os;print('shards='+json.dumps(list(range(int(os.environ['T'])))))" >> "$GITHUB_OUTPUT"
        env:
          T: ${{ github.event.inputs.total }}
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3 requests pillow
      - name: build already-done list for guji backup
        run: python sync.py prep
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: guji-sea
          S_PREFIX: naj
          PAGES_KEY: _cc/guji_pages.json
          PAN_DONE_KEY: _cc/guji_pan_done.json
          LEDGER_PREFIX: _ledger_guji/
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID: ${{ secrets.PAN_CID }}
          PAN_SEC: ${{ secrets.PAN_SEC }}
          PAN_DIR_A: "30464202"
          PAN_DIR_B: "30464203"

  run:
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 30
      matrix:
        shard: ${{ fromJSON(needs.prep.outputs.shards) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3 requests pillow
      - run: python sync.py
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}
          S_BUCKET: guji-sea
          S_PREFIX: naj
          PAGES_KEY: _cc/guji_pages.json
          PAN_DONE_KEY: _cc/guji_pan_done.json
          LEDGER_PREFIX: _ledger_guji/
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID: ${{ secrets.PAN_CID }}
          PAN_SEC: ${{ secrets.PAN_SEC }}
          PAN_DIR_A: "30464202"
          PAN_DIR_B: "30464203"
          NAME_KEY: ${{ secrets.NAME_KEY }}
          SHARD: ${{ matrix.shard }}
          TOTAL: ${{ github.event.inputs.total }}

  finalize:
    needs: run
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet boto3
      - name: aggregate shard ledgers and write summary
        run: |
          python - <<'PYEOF'
          import os, json, boto3

          EP = os.environ["S_EP"]
          AK = os.environ["S_AK"]
          SK = os.environ["S_SK"]
          BKT = "guji-sea"
          LEDGER_PFX = "_ledger_guji/"

          os.environ.pop("http_proxy", None); os.environ.pop("https_proxy", None)
          os.environ.pop("HTTP_PROXY", None); os.environ.pop("HTTPS_PROXY", None)
          s3 = boto3.client("s3", endpoint_url=EP, aws_access_key_id=AK,
                            aws_secret_access_key=SK, region_name="auto")

          paginator = s3.get_paginator("list_objects_v2")
          pages = paginator.paginate(Bucket=BKT, Prefix=LEDGER_PFX)

          zip_counts = {"ok":0,"reuse":0,"dup":0,"skip-done":0,"skip-empty":0,"skip-noname":0,"have":0,"err":0,"other":0}
          pdf_counts = {"ok":0,"reuse":0,"dup":0,"skip-done":0,"skip-empty":0,"skip-noname":0,"have":0,"err":0,"other":0}
          total_books = 0; total_pages = 0

          for page in pages:
              for obj in (page.get("Contents") or []):
                  k = obj["Key"]
                  if not k.endswith(".json") or "summary" in k:
                      continue
                  data = json.loads(s3.get_object(Bucket=BKT, Key=k)["Body"].read())
                  for row in data:
                      total_books += 1
                      total_pages += row.get("pages", 0)
                      zs = str(row.get("zip","other"))
                      ps = str(row.get("pdf","other"))
                      for st, cnt in [(zs, zip_counts),(ps, pdf_counts)]:
                          key = st if st in cnt else ("err" if st.startswith("err") else "other")
                          cnt[key] += 1

          summary = {
              "total_books": total_books,
              "total_pages": total_pages,
              "zip": zip_counts,
              "pdf": pdf_counts,
          }
          s3.put_object(Bucket=BKT, Key=LEDGER_PFX+"summary.json",
                        Body=json.dumps(summary, ensure_ascii=False, indent=2).encode())
          print("summary written to R2", flush=True)

          md = f"""## guji backup summary

| metric | value |
|--------|-------|
| books processed | {total_books} |
| pages total | {total_pages} |

### zip status
| status | count |
|--------|-------|
""" + "\n".join(f"| {k} | {v} |" for k,v in zip_counts.items() if v) + """

### pdf status
| status | count |
|--------|-------|
""" + "\n".join(f"| {k} | {v} |" for k,v in pdf_counts.items() if v)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write(md + "\n")
          print(json.dumps(summary, indent=2), flush=True)
          PYEOF
        env:
          S_EP: ${{ secrets.S_EP }}
          S_AK: ${{ secrets.S_AK }}
          S_SK: ${{ secrets.S_SK }}

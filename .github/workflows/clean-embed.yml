name: clean-embed-ingest

# Cloud-native clean-text ingest into tcm-rag-clean-768 (2026-07-04).
# Replaces the local standalone process (F:\0book\guyaofang-web\tools\rag\clean_embed_pipeline.py)
# which silently dies with no automatic detection -- violates the "supervision must be a GitHub
# automated task, never rely on a local thread" rule.
# Source: R2 clean_text/<source>/<key>.txt (uploaded once from local corpus by
#   upload_clean_text_to_r2.py) -> chunk -> Xunfei embed (768d) -> Vectorize REST upsert.
# ONLY writes tcm-rag-clean-768. Never touches tcm-rag-768 / tcm-rag-xf / any other index.
# Idempotent: R2 clean_text/_done/<hash>.done marker + Vectorize upsert same-id overwrite
#   (double idempotent, reruns only fill in what's missing, never duplicate).

on:
  workflow_dispatch:
    inputs:
      total:
        description: "shard count (matrix parallelism)"
        default: "20"
  # Auto-continue every 6 hours, only fills in what's not yet ingested (idempotent, additive only)
  schedule:
    - cron: "40 */6 * * *"

# Prevent overlapping rounds (would double-hit the Xunfei/Vectorize APIs); new round queues
# behind the old one, never kills an in-progress run.
concurrency:
  group: clean-embed-ingest
  cancel-in-progress: false

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - id: gen
        run: |
          python -c "
          import json, os
          T = int(os.environ['T'])
          print('shards=' + json.dumps(list(range(T))))
          " >> "$GITHUB_OUTPUT"
        env:
          T: ${{ github.event.inputs.total || '20' }}

  run:
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        shard: ${{ fromJSON(needs.prep.outputs.shards) }}
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --quiet boto3 requests
      - name: ingest shard
        run: python clean_embed_ingest.py
        env:
          CF_ACCOUNT_ID:     ${{ secrets.CF_ACCOUNT_ID }}
          CF_GLOBAL_EMAIL:   ${{ secrets.CF_GLOBAL_EMAIL }}
          CF_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}
          R2_ENDPOINT:       ${{ secrets.VEC_R2_ENDPOINT }}
          R2_ACCESS_KEY:     ${{ secrets.VEC_R2_ACCESS_KEY }}
          R2_SECRET_KEY:     ${{ secrets.VEC_R2_SECRET_KEY }}
          XF_KEYS:           ${{ secrets.XF_KEYS }}
          VEC_INDEX: "tcm-rag-clean-768"
          SHARD: ${{ matrix.shard }}
          TOTAL: ${{ github.event.inputs.total || '20' }}

  # AUDIT: query Vectorize REST info endpoint, print vector count after this run (self-reporting).
  audit:
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: query index vector count
        run: |
          curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/vectorize/v2/indexes/tcm-rag-clean-768/info" \
            -H "X-Auth-Email: ${CF_GLOBAL_EMAIL}" -H "X-Auth-Key: ${CF_GLOBAL_API_KEY}" \
            -H "Content-Type: application/json" | tee "$GITHUB_STEP_SUMMARY"
        env:
          CF_ACCOUNT_ID:     ${{ secrets.CF_ACCOUNT_ID }}
          CF_GLOBAL_EMAIL:   ${{ secrets.CF_GLOBAL_EMAIL }}
          CF_GLOBAL_API_KEY: ${{ secrets.CF_GLOBAL_API_KEY }}

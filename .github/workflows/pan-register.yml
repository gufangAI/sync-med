name: pan-register
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'scan, register, or auto (incremental)'
        default: 'scan'
      limit:
        description: 'max folders to register, 0 = all'
        default: '0'
      path:
        description: 'comma-separated 123 folder path from root (empty = default yaofang)'
        default: ''
  schedule:
    - cron: '0 3 * * *'   # 2026-07-17 改每天1次(原每2h,但单次实测耗3-5小时,比触发间隔还长,导致排队积压)
concurrency:
  group: pan-register
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip -q install requests
      - name: scan-register
        env:
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID: ${{ secrets.PAN_CID }}
          PAN_SEC: ${{ secrets.PAN_SEC }}
          ASSET_SYNC_TOKEN: ${{ secrets.ASSET_SYNC_TOKEN }}
          MODE: ${{ inputs.mode || 'auto' }}
          LIMIT: ${{ inputs.limit || '0' }}
          PAN_PATH: ${{ inputs.path || '' }}
        run: python scripts/pan_register.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pan-register-out
          path: out/
          if-no-files-found: warn

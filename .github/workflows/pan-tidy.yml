name: pan-tidy
on:
  workflow_dispatch:
    inputs:
      pattern:
        description: 'regex of loose root files to move'
        default: '^_ctext_.*\.txt$'
      target:
        description: 'target folder name at root'
        default: 'ctext'
      dry:
        description: '1 = list only'
        default: '0'
      search:
        description: '1 = locate files by keyword instead of tidying'
        default: '0'
      search_kw:
        description: 'keyword for search mode'
        default: '_ctext_'
      trash:
        description: '1 = scan root incl. trashed items'
        default: '0'
  schedule:
    - cron: '0 */6 * * *'   # 2026-07-17 每6小时自动清扫散落_ctext_*.txt回ctext目录,别再手动喊
concurrency:
  group: pan-tidy
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip -q install requests
      - name: tidy
        env:
          PAN_BASE: ${{ secrets.PAN_BASE }}
          PAN_CID: ${{ secrets.PAN_CID }}
          PAN_SEC: ${{ secrets.PAN_SEC }}
          PATTERN: ${{ inputs.pattern || '^_ctext_.*\.txt$' }}
          TARGET_NAME: ${{ inputs.target || 'ctext' }}
          DRY: ${{ inputs.dry || '0' }}
          SEARCH: ${{ inputs.search || '0' }}
          SEARCH_KW: ${{ inputs.search_kw || '_ctext_' }}
          TRASH: ${{ inputs.trash || '0' }}
        run: python scripts/pan_tidy.py

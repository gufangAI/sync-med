# ============================================================

name: Intel Radar Daily Report v3

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只抓取不分析 (测试抓取量)'
        required: false
        default: 'false'
      no_github:
        description: '跳过 GitHub 抓取 (省速率限额)'
        required: false
        default: 'false'

concurrency:
  group: intel-radar
  cancel-in-progress: false   # 不取消已在运行的，排队等待

jobs:
  daily-report:
    name: Generate Daily Intel Report v3
    runs-on: ubuntu-latest   # 标准 runner, public repo 完全免费
    timeout-minutes: 30      # 海量抓取 + 并行分析需要时间

    permissions:
      contents: read
      issues: write    # gh issue create 发情报日报到手机需要(连挂6天缺这个)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Intel Radar v3 (cloud mode)
        env:
          GH_TOKEN: ${{ github.token }}   # gh 发issue认证·连挂6天缺这个
          ZHIPU_API_KEY:  ${{ secrets.ZHIPU_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          CF_ACCOUNT_ID:  ${{ secrets.CF_ACCOUNT_ID }}
          D1_API_TOKEN:   ${{ secrets.D1_API_TOKEN }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.no_github }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --no-github"
          fi
          python scripts/intel_radar/daily_report_v3.py --cloud $EXTRA_ARGS

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intel-radar-report-${{ github.run_id }}
          path: scripts/intel_radar/reports/
          retention-days: 30

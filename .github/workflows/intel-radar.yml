# ============================================================
# 情报雷达 v3 · 每日自动运行
# 放置路径: gufangAI/sync-med/.github/workflows/intel-radar.yml
#
# 触发: 每天 UTC 02:00 (北京时间 10:00) + 手动触发
# 产出: 创建 Issue 到 gufangAI/sync-med → 手机通知
# Runner: ubuntu-latest (标准 runner, public repo 真免费)
# ============================================================

name: Intel Radar Daily Report v3

on:
  schedule:
    # UTC 02:00 = 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只抓取不分析 (测试抓取量)'
        required: false
        default: 'false'
      no_github:
        description: '跳过 GitHub 抓取 (省速率限额)'
        required: false
        default: 'false'

# 防止同一时段重叠运行
concurrency:
  group: intel-radar
  cancel-in-progress: false   # 不取消进行中的，排队等待

jobs:
  daily-report:
    name: Generate & Push Daily Intel Report v3
    runs-on: ubuntu-latest   # 标准 runner, public repo 真免费
    timeout-minutes: 30      # 海量抓取 + 并行分析需要时间

    permissions:
      issues: write   # gh issue create 需要
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Intel Radar v3 (cloud mode)
        env:
          # LLM keys — 从 repo secrets 读，绝不明文进代码
          ZHIPU_API_KEY:  ${{ secrets.ZHIPU_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          # gh CLI 用 GITHUB_TOKEN 自动鉴权，无需额外配置
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.no_github }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --no-github"
          fi
          python scripts/intel_radar/daily_report_v3.py --cloud $EXTRA_ARGS

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intel-radar-report-${{ github.run_id }}
          path: scripts/intel_radar/reports/
          retention-days: 30
